adminUser: admin
adminPassword: admin

persistence:
  enabled: false

service:
  type: ClusterIP

grafana.ini:
  server:
    root_url: http://localhost:3300

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus-server.monitoring.svc.cluster.local
        isDefault: true
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        jsonData:
          derivedFields:
            - name: TraceID
              matcherRegex: "trace_id[=\": ]+([0-9a-f]{16,32})"
              datasourceUid: tempo
              url: "$${__value.raw}"
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo.monitoring.svc.cluster.local:3200
        jsonData:
          serviceMap:
            datasourceUid: prometheus

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: htf-dashboards
        orgId: 1
        folder: HTF
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/htf-dashboards

dashboards:
  htf-dashboards:
    htf-observability-overview:
      json: |
        {
          "id": null,
          "uid": "htf-overview",
          "title": "HTF Observability Overview",
          "tags": ["htf", "demo"],
          "timezone": "browser",
          "schemaVersion": 39,
          "version": 1,
          "refresh": "10s",
          "time": {
            "from": "now-15m",
            "to": "now"
          },
          "templating": {
            "list": []
          },
          "panels": [
            {
              "id": 1,
              "type": "timeseries",
              "title": "Prometheus: Up Targets",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "gridPos": {
                "h": 8,
                "w": 12,
                "x": 0,
                "y": 0
              },
              "targets": [
                {
                  "expr": "up",
                  "legendFormat": "{{job}}",
                  "refId": "A"
                }
              ]
            },
            {
              "id": 2,
              "type": "logs",
              "title": "Loki: Recent prod Logs",
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "gridPos": {
                "h": 8,
                "w": 12,
                "x": 12,
                "y": 0
              },
              "targets": [
                {
                  "expr": "{namespace=\"prod\"}",
                  "refId": "A"
                }
              ],
              "options": {
                "showTime": true,
                "sortOrder": "Descending",
                "wrapLogMessage": true
              }
            },
            {
              "id": 3,
              "type": "table",
              "title": "Tempo Traces",
              "gridPos": {
                "h": 9,
                "w": 24,
                "x": 0,
                "y": 8
              },
              "datasource": {
                "type": "tempo",
                "uid": "tempo"
              },
              "targets": [
                {
                  "refId": "A",
                  "queryType": "traceqlSearch",
                  "query": "{}",
                  "tableType": "traces",
                  "limit": 20,
                  "spss": 3,
                  "filters": []
                }
              ],
              "options": {
                "showHeader": true,
                "cellHeight": "sm"
              }
            }
          ]
        }